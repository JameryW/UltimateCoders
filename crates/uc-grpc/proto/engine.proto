syntax = "proto3";
package ultimate_coders;

service EngineService {
    rpc Search(SearchRequest) returns (SearchResponse);
    rpc IndexRepo(IndexRepoRequest) returns (IndexRepoResponse);
    rpc GetIndexState(GetIndexStateRequest) returns (GetIndexStateResponse);
    rpc RemoveIndex(RemoveIndexRequest) returns (RemoveIndexResponse);
    rpc ReadMemory(ReadMemoryRequest) returns (ReadMemoryResponse);
    rpc WriteMemory(WriteMemoryRequest) returns (WriteMemoryResponse);
    rpc DeleteMemory(DeleteMemoryRequest) returns (DeleteMemoryResponse);
    rpc SearchMemory(SearchMemoryRequest) returns (SearchMemoryResponse);
    rpc Health(HealthRequest) returns (HealthResponse);
    rpc BatchWriteMemory(BatchWriteMemoryRequest) returns (BatchWriteMemoryResponse);
    rpc ListRepos(ListReposRequest) returns (ListReposResponse);
    rpc ListDir(ListDirRequest) returns (ListDirResponse);
    rpc GetFile(GetFileRequest) returns (GetFileResponse);
    rpc SearchStream(SearchStreamRequest) returns (stream SearchResultItem);
}

// ── Task Service (for TUI / Dashboard clients) ─────────

service TaskService {
    rpc SubmitTask(SubmitTaskRequest) returns (SubmitTaskResponse);
    rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
    rpc WatchTask(WatchTaskRequest) returns (stream TaskEvent);
    rpc PauseTask(PauseTaskRequest) returns (PauseTaskResponse);
    rpc ResumeTask(ResumeTaskRequest) returns (ResumeTaskResponse);
}

// ── Dashboard Service (NATS passthrough to Python Orchestrator) ──

service DashboardService {
    rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
    rpc GetSchedulerStatus(GetSchedulerStatusRequest) returns (GetSchedulerStatusResponse);
    rpc GetCircuitBreakerStatus(GetCircuitBreakerStatusRequest) returns (CircuitBreakerStatusResponse);
    rpc ResetCircuitBreaker(ResetCircuitBreakerRequest) returns (ResetCircuitBreakerResponse);
    rpc TriggerSchedulerJob(TriggerSchedulerJobRequest) returns (TriggerSchedulerJobResponse);
    rpc FlushPendingTasks(FlushPendingTasksRequest) returns (FlushPendingTasksResponse);
    rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
    rpc WatchDashboard(WatchDashboardRequest) returns (stream DashboardSnapshot);
}

// ── Search ──────────────────────────────────────────────

message SearchRequest {
    string query = 1;
    repeated string modes = 2;
    repeated string repo_ids = 3;
    repeated string languages = 4;
    repeated string path_patterns = 5;
    uint32 max_results = 6;
}

message SearchResponse {
    repeated SearchResultItem items = 1;
}

message SearchResultItem {
    string repo_id = 1;
    string file_path = 2;
    uint32 start_line = 3;
    uint32 end_line = 4;
    string content_snippet = 5;
    string match_type = 6;
    float score = 7;
    optional string symbol_name = 8;
    optional string symbol_kind = 9;
    optional string parent_symbol = 10;
}

// ── Index ───────────────────────────────────────────────

message IndexRepoRequest {
    string repo_id = 1;
    string remote_url = 2;
    string default_branch = 3;
    optional string local_path = 4;
    bool force_full = 5;
}

message IndexRepoResponse {
    string repo_id = 1;
    uint32 files_indexed = 2;
    uint32 symbols_extracted = 3;
    uint32 chunks_embedded = 4;
    uint64 duration_ms = 5;
}

message GetIndexStateRequest {
    string repo_id = 1;
}

message GetIndexStateResponse {
    string repo_id = 1;
    bool indexed = 2;
    optional string last_indexed_sha = 3;
    uint32 files_count = 4;
    uint32 symbols_count = 5;
    uint32 chunks_count = 6;
    optional string local_path = 7;
}

message RemoveIndexRequest {
    string repo_id = 1;
}

message RemoveIndexResponse {}

// ── Memory ──────────────────────────────────────────────

message ReadMemoryRequest {
    string key_scope = 1;   // "task", "project", "global"
    string task_id = 2;
    string project_id = 3;
    string key = 4;
    bool include_semantic = 5;
}

message ReadMemoryResponse {
    optional MemoryEntryProto entry = 1;
}

message WriteMemoryRequest {
    string key_scope = 1;
    string task_id = 2;
    string project_id = 3;
    string key = 4;
    string content_type = 5;  // "text", "structured", "code", "diff", "reference"
    string content = 6;
    string source_agent = 7;
    float importance = 8;
    repeated string tags = 9;
    // Structured content sub-fields
    optional string language = 10;     // For content_type="code"
    optional string file_path = 11;    // For content_type="diff"
    optional string uri = 12;          // For content_type="reference"
    optional string description = 13;  // For content_type="reference"
}

message WriteMemoryResponse {
    MemoryEntryProto entry = 1;
}

message DeleteMemoryRequest {
    string key_scope = 1;
    string task_id = 2;
    string project_id = 3;
    string key = 4;
}

message DeleteMemoryResponse {}

message SearchMemoryRequest {
    string query = 1;
    string scope_type = 2;   // "project", "global", "all"
    string project_id = 3;
    uint32 max_results = 4;
    float min_score = 5;
}

message SearchMemoryResponse {
    repeated MemorySearchResultProto results = 1;
}

message MemoryEntryProto {
    string id = 1;
    string content_type = 2;
    string content = 3;
    string source_agent = 4;
    float importance = 5;
    repeated string tags = 6;
    int64 created_at = 7;
    int64 updated_at = 8;
    // Key fields for reconstructing MemoryKey on the client side
    string key_scope = 9;
    string key_task_id = 10;
    string key_project_id = 11;
    string key = 12;
    // Structured content sub-fields
    optional string language = 13;     // For content_type="code"
    optional string file_path = 14;    // For content_type="diff"
    optional string uri = 15;          // For content_type="reference"
    optional string description = 16;  // For content_type="reference"
}

message MemorySearchResultProto {
    MemoryEntryProto entry = 1;
    float score = 2;
}

// ── Health ──────────────────────────────────────────────

message HealthRequest {}

message HealthResponse {
    string status = 1;
    string version = 2;
    uint64 uptime_seconds = 3;
    repeated ComponentHealthProto components = 4;
}

message ComponentHealthProto {
    string name = 1;
    string status = 2;
    optional string details = 3;
}

// ── Task Service Messages ───────────────────────────────

message SubmitTaskRequest {
    string description = 1;
    string project_id = 2;
}

message SubmitTaskResponse {
    bool success = 1;
    string task_id = 2;
    string status = 3;
    uint32 subtask_count = 4;
    repeated SubtaskProto subtasks = 5;
    optional string error = 6;
}

message GetTaskRequest {
    string task_id = 1;
}

message GetTaskResponse {
    bool available = 1;
    optional TaskProto task = 2;
}

message ListTasksRequest {}

message ListTasksResponse {
    bool available = 1;
    repeated TaskProto tasks = 2;
    uint32 total = 3;
    map<string, uint32> status_counts = 4;
}

message PauseTaskRequest {
    string task_id = 1;
}

message PauseTaskResponse {
    bool success = 1;
    string task_id = 2;
    string status = 3;
    optional string error = 4;
}

message ResumeTaskRequest {
    string task_id = 1;
}

message ResumeTaskResponse {
    bool success = 1;
    string task_id = 2;
    string status = 3;
    optional string error = 4;
}

message WatchTaskRequest {
    string task_id = 1;  // empty = watch all tasks
}

message TaskEvent {
    string timestamp = 1;
    string type = 2;       // task_submitted, subtask_started, tool_call, tool_result, subtask_completed, subtask_failed, task_completed
    string task_id = 3;
    optional string subtask_id = 4;
    map<string, string> data = 5;  // event-specific payload as string map
}

message TaskProto {
    string id = 1;
    string description = 2;
    string status = 3;
    string project_id = 4;
    uint32 subtask_count = 5;
    int64 created_at = 6;
    int64 updated_at = 7;
    repeated SubtaskProto subtasks = 8;
}

message SubtaskProto {
    string id = 1;
    string description = 2;
    string status = 3;
    repeated string depends_on = 4;
    optional string assigned_worker = 5;
    string parent_id = 6;
    repeated string file_constraints = 7;
    string expected_output = 8;
    optional string result = 9;
}

// ── Batch Memory ────────────────────────────────────────

message BatchWriteMemoryRequest {
    repeated WriteMemoryRequest requests = 1;
}

message BatchWriteMemoryResponse {
    repeated MemoryEntryProto entries = 1;
}

// ── Repos ───────────────────────────────────────────────

message ListReposRequest {}

message ListReposResponse {
    repeated RepoIndexStateProto repos = 1;
}

message RepoIndexStateProto {
    string repo_id = 1;
    bool indexed = 2;
    optional string last_indexed_sha = 3;
    uint32 files_count = 4;
    uint32 symbols_count = 5;
    uint32 chunks_count = 6;
    optional string local_path = 7;
}

// ── File Browser ─────────────────────────────────────────

message ListDirRequest {
    string repo_id = 1;
    string path = 2;    // sub-path within repo, "" = root
}

message DirEntryProto {
    string name = 1;
    string path = 2;
    string entry_type = 3;  // "file" or "directory"
    uint64 size = 4;
}

message ListDirResponse {
    string repo_id = 1;
    string path = 2;
    repeated DirEntryProto entries = 3;
}

message GetFileRequest {
    string repo_id = 1;
    string path = 2;
}

message GetFileResponse {
    string repo_id = 1;
    string path = 2;
    bool binary = 3;
    uint64 size = 4;
    optional string content = 5;
    optional string language = 6;
    bool truncated = 7;
    uint32 lines = 8;
}

// ── Search Stream ───────────────────────────────────────

message SearchStreamRequest {
    string query = 1;
    repeated string modes = 2;
    repeated string repo_ids = 3;
    repeated string languages = 4;
    repeated string path_patterns = 5;
    uint32 max_results = 6;
}

// ── Dashboard Service Messages ───────────────────────────

message ListWorkersRequest {}

message ListWorkersResponse {
    bool available = 1;
    repeated WorkerProto workers = 2;
    uint32 total = 3;
    uint32 available_count = 4;
}

message WorkerProto {
    string id = 1;
    repeated string capabilities = 2;
    uint32 current_load = 3;
    uint32 max_capacity = 4;
    uint32 load_percent = 5;
    string last_heartbeat = 6;
    double heartbeat_age_seconds = 7;
    bool heartbeat_stale = 8;
    bool is_available = 9;
}

message GetSchedulerStatusRequest {}

message GetSchedulerStatusResponse {
    bool available = 1;
    bool is_running = 2;
    optional NightWindowProto night_window = 3;
    repeated ScheduledJobProto jobs = 4;
    repeated ExecutionHistoryProto execution_history = 5;
}

message NightWindowProto {
    string start = 1;  // HH:MM
    string end = 2;    // HH:MM
    bool enabled = 3;
}

message ScheduledJobProto {
    string id = 1;
    string name = 2;
    string cron = 3;
    bool enabled = 4;
    optional string last_run = 5;
    optional string next_run = 6;
}

message ExecutionHistoryProto {
    string job_id = 1;
    string job_name = 2;
    string executed_at = 3;
    bool success = 4;
    optional string error = 5;
}

message GetCircuitBreakerStatusRequest {}

message CircuitBreakerStatusResponse {
    bool available = 1;
    CircuitBreakerProto circuit_breaker = 2;
    RateLimiterProto rate_limiter = 3;
}

message CircuitBreakerProto {
    string state = 1;          // "closed", "open", "half_open"
    uint32 failure_count = 2;
    uint32 failure_threshold = 3;
    double recovery_timeout_seconds = 4;
    optional string last_failure = 5;
}

message RateLimiterProto {
    uint32 max_requests = 1;
    double window_seconds = 2;
    uint32 current_requests = 3;
    double remaining_ratio = 4;
}

message ResetCircuitBreakerRequest {}

message ResetCircuitBreakerResponse {
    bool success = 1;
    string state = 2;
    optional string error = 3;
}

message TriggerSchedulerJobRequest {
    string job_id = 1;
}

message TriggerSchedulerJobResponse {
    bool success = 1;
    string job_id = 2;
    optional string error = 3;
}

message FlushPendingTasksRequest {}

message FlushPendingTasksResponse {
    bool success = 1;
    uint32 pending_count = 2;
    uint32 executed_count = 3;
    optional string error = 4;
}

message ListEventsRequest {
    optional string task_id = 1;
    uint32 limit = 2;
    uint32 offset = 3;
}

message ListEventsResponse {
    bool available = 1;
    repeated DashboardEventProto events = 2;
    uint32 total = 3;
    uint32 offset = 4;
    uint32 limit = 5;
}

message DashboardEventProto {
    string timestamp = 1;
    string type = 2;
    string task_id = 3;
    map<string, string> data = 4;
}

message WatchDashboardRequest {}

message DashboardSnapshot {
    string timestamp = 1;
    optional HealthSnapshot health = 2;
    optional ListWorkersResponse workers = 3;
    optional ListTasksResponse tasks = 4;
    optional GetSchedulerStatusResponse scheduler = 5;
    optional CircuitBreakerStatusResponse circuit_breaker = 6;
    repeated DashboardEventProto recent_events = 7;
    repeated TaskEvent recent_task_events = 8;
}

message HealthSnapshot {
    bool available = 1;
    string status = 2;
    optional string version = 3;
    optional uint64 uptime_seconds = 4;
}
