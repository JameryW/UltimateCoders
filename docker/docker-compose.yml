
# Development environment for UltimateCoders.
# Starts all storage backends needed for the engine:
#   TiKV (PD + KV)    — short-term memory, task state, snapshots
#   Qdrant             — semantic vector search, long-term memory
#   PostgreSQL         — structured metadata (symbols, references, repos)
#   NATS JetStream     — async event stream (agent events, indexing jobs)
#
# Dashboard is embedded in the Orchestrator process and exposes
# a web UI on port 8080. Map the port when running the
# Orchestrator in Docker:
#   docker run -p 8080:8080 ...

services:
  # ── TiKV cluster: Placement Driver ────────────────────────────
  pd:
    image: pingcap/pd:v7.5.7
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd_data:/data
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://127.0.0.1:2379,http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --data-dir=/data
      - --initial-cluster=pd=http://pd:2380
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2379/health"]
      interval: 10s
      retries: 5

  # ── TiKV cluster: KV store ────────────────────────────────────
  tikv:
    image: pingcap/tikv:v7.5.7
    depends_on:
      pd:
        condition: service_healthy
    volumes:
      - tikv_data:/data
      - ./tikv.toml:/etc/tikv/tikv.toml:ro
    command:
      - --pd-endpoints=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --data-dir=/data
      - --config=/etc/tikv/tikv.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://pd:2379/pd/api/v1/stores || exit 1"]
      interval: 15s
      retries: 10
      start_period: 60s

  # ── Qdrant vector database ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ultimate_coders
      POSTGRES_PASSWORD: ultimate_coders
      POSTGRES_DB: ultimate_coders
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ultimate_coders"]
      interval: 10s
      retries: 5

  # ── NATS with JetStream ───────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # Management / monitoring
    volumes:
      - nats_data:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    command: --config /etc/nats/nats.conf
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      retries: 5

  # ── UltimateCoders gRPC Gateway ──────────────────────────────────
  # The gateway runs the Rust gRPC server (EngineService, TaskService,
  # DashboardService, WorkerService). Workers register with it via
  # gRPC WorkerService and receive subtask dispatch via NATS.
  # Use: docker compose --profile gateway up
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.grpc
    profiles: ["gateway", "app"]
    ports:
      - "50051:50051"  # gRPC + gRPC-Web
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    # ── ScaleWorkers support ──────────────────────────────────────────
    # Mounting /var/run/docker.sock grants the gateway full host-root
    # equivalence (dev/internal only — harden with a socket proxy before
    # exposing to untrusted networks). The compose dir is mounted so the
    # gateway can invoke `docker compose -f <file> up -d --scale worker=N`.
    # `../` resolves to the repo root (the compose context), giving the
    # gateway read access to docker/docker-compose.yml.
    #
    # SCOPE: the socket only controls the LOCAL docker daemon, so
    # ScaleWorkers scales workers on THIS host only — NOT across hosts.
    # True cross-host scaling requires docker swarm mode, a remote docker
    # context, or a per-host gateway (future work).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/app/docker-compose-root:ro
      # Mount the host workspace (uc.repos.yaml scan_dirs) so the gateway can
      # index ~/aiworks repos at startup. Read-only — the gateway never writes here.
      # ponytail: host path hardcoded (machine-specific), same path in/out so
      # uc.repos.yaml scan_dirs need no remapping.
      - /Users/jameryw/aiworks:/Users/jameryw/aiworks:ro
    environment:
      UC_TIKV_PD_ENDPOINTS: "pd:2379"
      UC_QDRANT_URL: "http://qdrant:6334"
      UC_PG_URL: "postgresql://ultimate_coders:ultimate_coders@postgres:5432/ultimate_coders"
      UC_NATS_URL: "nats://nats:4222"
      UC_GRPC_ADDR: "[::]:50051"
      UC_CORS_MODE: "dev"
      # Point the gateway at the workspace config (mounted via docker-compose-root).
      # The binary's CWD is /app, so the relative ./uc.repos.yaml lookup would miss it.
      UC_REPOS_CONFIG: "/app/docker-compose-root/uc.repos.yaml"
      # ScaleWorkers: compose file + project name for `docker compose` shell-out.
      UC_COMPOSE_FILE: "/app/docker-compose-root/docker/docker-compose.yml"
      UC_COMPOSE_PROJECT: "docker"
    # Auto-restart on crash/host reboot. Matches the standalone gateway compose.
    restart: unless-stopped
    # Lightweight liveness check: the gRPC server listens on 50051. We probe
    # the TCP port via bash /dev/tcp (bookworm-slim ships bash). The standard
    # tonic_health service is registered for EngineService, but
    # grpc_health_probe isn't in the image — a TCP connect is sufficient for
    # liveness (the process is up and bound). start_period is short (5s):
    # serve binds 50051 before workspace indexing runs (indexing is a
    # detached background task, never blocks the listener), so the port is
    # available within seconds of process start.
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/50051' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── UltimateCoders Orchestrator (with Dashboard) ─────────────
  # Run the Orchestrator with the embedded web dashboard.
  # The dashboard is available at http://localhost:8080/dashboard/
  # Use: docker compose --profile app up
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["app"]
    ports:
      - "8080:8080"   # Dashboard web UI + SSE
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      UC_TIKV_PD_ENDPOINTS: "pd:2379"
      UC_QDRANT_URL: "http://qdrant:6334"
      UC_PG_URL: "postgresql://ultimate_coders:ultimate_coders@postgres:5432/ultimate_coders"
      UC_NATS_URL: "nats://nats:4222"
    command: ["python", "-m", "ultimate_coders.cli", "start", "--dashboard", "--host", "0.0.0.0", "--port", "8080"]

  # ── UltimateCoders Distributed Worker ────────────────────────────
  # Independent process that registers with the Gateway via gRPC
  # WorkerService, subscribes to NATS for subtask dispatch, and
  # executes subtasks via the Python Worker + Sandbox.
  # Can be scaled: docker compose --profile worker up --scale worker=3
  # Use: docker compose --profile worker up
  #
  # Git sync (Phase 1): when UC_REPO_URL is set, the worker clones
  # the external repo into /workspace on first start (persisted across
  # restarts via the worker_workspace volume), fetches before each
  # worktree acquire, and optionally pushes the subtask branch on
  # release. With `--scale worker=N`, all replicas on the same host
  # share the same named volume (one clone) — this is fine because git
  # worktree isolates each subtask off the shared clone. Cross-host
  # deployment gives each host its own volume + clone (each host runs
  # its own docker compose); true cross-host scaling/orchestration is
  # future work (docker swarm / k8s).
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["worker", "app"]
    depends_on:
      nats:
        condition: service_healthy
      gateway:
        condition: service_started
    environment:
      UC_NATS_URL: "nats://nats:4222"
      UC_GRPC_ENDPOINT: "http://gateway:50051"
      UC_SANDBOX_MODE: "subprocess"
      UC_PROJECT_PATH: "/workspace"
      # ── External git sync (Phase 1) ───────────────────────────────
      # Leave UC_REPO_URL empty to keep the legacy local-only behaviour.
      UC_REPO_URL: "${UC_REPO_URL:-}"
      UC_REPO_BASE_BRANCH: "${UC_REPO_BASE_BRANCH:-main}"
      UC_GIT_FETCH_ON_ACQUIRE: "${UC_GIT_FETCH_ON_ACQUIRE:-true}"
      # Push to external remote is opt-in (off by default for MVP safety).
      UC_GIT_PUSH_ON_RELEASE: "${UC_GIT_PUSH_ON_RELEASE:-false}"
      UC_GIT_TOKEN: "${UC_GIT_TOKEN:-}"
      GIT_USERNAME: "${GIT_USERNAME:-x-access-token}"
      GIT_TERMINAL_PROMPT: "0"
      GIT_ASKPASS: "/usr/local/bin/git-askpass"
    volumes:
      # Persist the clone across container restarts. Shared by all
      # same-host replicas (see note above) — cross-host gets its own.
      - worker_workspace:/workspace
    command: ["python", "-m", "ultimate_coders.nats_worker", "--mode", "worker"]

  # ── UltimateCoders NATS Worker (default mode: Orchestrator) ──────
  # Full Orchestrator mode — subscribes to uc.task.submit, decomposes
  # tasks via LLM, and dispatches subtasks to Workers.
  # Use: docker compose --profile app up
  nats-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["app"]
    depends_on:
      pd:
        condition: service_healthy
      tikv:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      UC_NATS_URL: "nats://nats:4222"
      UC_TIKV_PD_ENDPOINTS: "pd:2379"
      UC_QDRANT_URL: "http://qdrant:6334"
      UC_PG_URL: "postgresql://ultimate_coders:ultimate_coders@postgres:5432/ultimate_coders"
      UC_GRPC_ENDPOINT: "http://gateway:50051"
      UC_SANDBOX_MODE: "subprocess"
      UC_PROJECT_PATH: "/workspace"
      # ── External git sync (Phase 1) ───────────────────────────────
      # Same env as the worker service; empty UC_REPO_URL = local mode.
      UC_REPO_URL: "${UC_REPO_URL:-}"
      UC_REPO_BASE_BRANCH: "${UC_REPO_BASE_BRANCH:-main}"
      UC_GIT_FETCH_ON_ACQUIRE: "${UC_GIT_FETCH_ON_ACQUIRE:-true}"
      UC_GIT_PUSH_ON_RELEASE: "${UC_GIT_PUSH_ON_RELEASE:-false}"
      UC_GIT_TOKEN: "${UC_GIT_TOKEN:-}"
      GIT_USERNAME: "${GIT_USERNAME:-x-access-token}"
      GIT_TERMINAL_PROMPT: "0"
      GIT_ASKPASS: "/usr/local/bin/git-askpass"
    volumes:
      - worker_workspace:/workspace
    command: ["python", "-m", "ultimate_coders.nats_worker"]

volumes:
  pd_data:
  tikv_data:
  qdrant_data:
  pg_data:
  nats_data:
  # Persist worker git clones across container restarts.
  worker_workspace:
