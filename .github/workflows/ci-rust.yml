name: Rust CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/docker-compose.yml"
      - ".github/workflows/ci-rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "docker/docker-compose.yml"
      - ".github/workflows/ci-rust.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace

  test-no-storage:
    name: test (no storage feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test -p uc-engine -p uc-grpc --no-default-features

  test-default:
    name: test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test -p uc-engine -p uc-grpc

  test-indexing:
    name: test (indexing feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p uc-engine --features indexing

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  storage-integration:
    name: storage integration tests
    runs-on: ubuntu-latest
    # Only run on main pushes or manual trigger to avoid PR noise from infra flakiness
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Start storage infrastructure
        run: |
          # TiKV can OOM on first start in CI; retry once after a short pause.
          docker compose -f docker/docker-compose.yml up -d --wait || {
            echo "::warning::First attempt failed, printing logs and retrying..."
            docker compose -f docker/docker-compose.yml logs tikv || true
            docker compose -f docker/docker-compose.yml down -v
            sleep 5
            docker compose -f docker/docker-compose.yml up -d --wait
          }
      - name: Wait for TiKV store readiness
        run: |
          # PD can be healthy while TiKV store is still initializing.
          # Probe with a raw put until it succeeds (max 30s).
          for i in $(seq 1 15); do
            if docker compose -f docker/docker-compose.yml exec -T pd pd-ctl store 2>/dev/null | grep -q "Up"; then
              echo "TiKV store is ready"
              exit 0
            fi
            echo "Waiting for TiKV store... ($i/15)"
            sleep 2
          done
          echo "::warning::TiKV store not confirmed ready after 30s, proceeding anyway"
      - name: Run storage integration tests
        run: cargo test --features storage -- --ignored
        env:
          UC_PG_URL: postgresql://ultimate_coders:ultimate_coders@localhost:5432/ultimate_coders
          UC_QDRANT_URL: http://localhost:6334
          UC_TIKV_PD_ENDPOINTS: localhost:2379
      - name: Print logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs
      - name: Stop storage infrastructure
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v