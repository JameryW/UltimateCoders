name: Python CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
      - "dashboard/**"
  pull_request:
    branches: [main]
    paths:
      - "python/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci-python.yml"
      - "dashboard/**"

jobs:
  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff pyyaml
      - run: ruff check python/ tests/

  # ponytail: dashboard lint + import check
  dashboard:
    name: dashboard checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff fastapi uvicorn httpx
      - run: ruff check python/ultimate_coders/dashboard/
      - name: Import check
        run: PYTHONPATH=python python -c "from ultimate_coders.dashboard.app import DashboardApp; print('dashboard import OK')"

  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - run: pip install pytest pytest-asyncio pytest-cov pyyaml maturin httpx anthropic litellm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Build Rust extension
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install pytest pytest-asyncio pytest-cov pyyaml httpx anthropic litellm
          maturin develop --release --manifest-path crates/uc-python/Cargo.toml
      - name: Run tests
        run: |
          source .venv/bin/activate
          PYTHONPATH=python pytest tests/python/ -v
