name: Dashboard CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/ci-dashboard.yml"
  pull_request:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/ci-dashboard.yml"

jobs:
  typecheck:
    name: typecheck (app + node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      # Root tsconfig.json is a project-references shell (files:[] + references);
      # a bare `tsc --noEmit` silently skips the referenced projects' src and
      # exits 0 even on real type errors. Check each referenced project directly.
      - run: |
          pnpm exec tsc -p tsconfig.app.json --noEmit
          pnpm exec tsc -p tsconfig.node.json --noEmit

  build:
    name: vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vite build
