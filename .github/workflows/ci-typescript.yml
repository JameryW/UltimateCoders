name: TypeScript CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/uc-orchestrator/**"
      - "vendor/oh-my-pi/packages/mnemopi/**"
      - "vendor/oh-my-pi/packages/coding-agent/**"
      - ".github/workflows/ci-typescript.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/uc-orchestrator/**"
      - "vendor/oh-my-pi/packages/mnemopi/**"
      - "vendor/oh-my-pi/packages/coding-agent/**"
      - ".github/workflows/ci-typescript.yml"

jobs:
  bun-test-mnemopi:
    name: bun test (mnemopi)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: vendor/oh-my-pi/packages/mnemopi
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
        working-directory: vendor/oh-my-pi
      # ponytail: build pi_natives for the runner's arch in-place — only
      # darwin-x64-modern.node is committed (Intel dev machines); macos-latest
      # is arm64, so without this build loadNative fails → 760 test failures.
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: vendor/oh-my-pi/packages/natives
        run: bun run build
      - run: bun test --parallel

  bun-test-coding-agent:
    name: bun test (coding-agent)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: vendor/oh-my-pi/packages/coding-agent
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
        working-directory: vendor/oh-my-pi
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: vendor/oh-my-pi/packages/natives
        run: bun run build
      - run: bun test --parallel=4 test src

  bun-test-uc-orchestrator:
    name: bun test (uc-orchestrator)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/uc-orchestrator
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      # ponytail: OMP vendor install — the pi_natives build (next step) needs
      # @napi-rs/cli's `napi` binary, which lives in vendor/oh-my-pi/node_modules,
      # not packages/uc-orchestrator/node_modules.
      - run: bun install --frozen-lockfile
        working-directory: vendor/oh-my-pi
      - uses: dtolnay/rust-toolchain@stable
      - working-directory: vendor/oh-my-pi/packages/natives
        run: bun run build
      - run: bun test
