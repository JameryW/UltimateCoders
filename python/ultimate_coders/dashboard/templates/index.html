<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltimateCoders Dashboard</title>
    <!-- Tailwind CSS CDN: SRI not applicable for the play CDN (dynamic, version-pinned by URL) -->
    <script src="https://cdn.tailwindcss.com" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; }
        .status-ok { color: #22c55e; }
        .status-degraded { color: #eab308; }
        .status-error, .status-fallback { color: #ef4444; }
        .status-disabled { color: #6b7280; }
        .status-unavailable { color: #6b7280; }
        .status-closed { color: #22c55e; }
        .status-open { color: #ef4444; }
        .status-half_open { color: #eab308; }
        .badge-ok { background-color: #166534; color: #bbf7d0; }
        .badge-degraded { background-color: #713f12; color: #fef08a; }
        .badge-error, .badge-fallback { background-color: #7f1d1d; color: #fecaca; }
        .badge-disabled, .badge-unavailable { background-color: #374151; color: #9ca3af; }
        .badge-closed { background-color: #166534; color: #bbf7d0; }
        .badge-open { background-color: #7f1d1d; color: #fecaca; }
        .badge-half_open { background-color: #713f12; color: #fef08a; }
        .load-bar { height: 6px; border-radius: 3px; background-color: #334155; }
        .load-bar-fill { height: 6px; border-radius: 3px; transition: width 0.3s ease; }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; }
        .connection-status { position: fixed; bottom: 16px; right: 16px; padding: 6px 12px; border-radius: 6px; font-size: 12px; z-index: 50; }
    </style>
</head>
<body class="text-gray-200 min-h-screen">

    <!-- Header -->
    <header class="border-b border-gray-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <h1 class="text-xl font-bold text-white">UltimateCoders</h1>
                <span class="text-sm text-gray-400">Dashboard</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="last-update" class="text-xs text-gray-500">--</span>
                <span id="connection-indicator" class="pulse-dot bg-green-500"></span>
            </div>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">

        <!-- Engine Health Card -->
        <div class="card p-4 md:col-span-2 xl:col-span-2">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Engine Health</h2>
                <span id="health-overall" class="text-xs px-2 py-0.5 rounded badge-unavailable">--</span>
            </div>
            <div id="health-components" class="space-y-2 text-sm">
                <p class="text-gray-500">Waiting for data...</p>
            </div>
            <div id="health-meta" class="mt-3 pt-3 border-t border-gray-700 text-xs text-gray-500"></div>
        </div>

        <!-- Circuit Breaker / Rate Limiter Card -->
        <div class="card p-4">
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide mb-3">Circuit Breaker</h2>
            <div id="circuit-breaker-panel" class="space-y-2 text-sm">
                <p class="text-gray-500">Waiting for data...</p>
            </div>
            <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide mb-3 mt-4 pt-3 border-t border-gray-700">Rate Limiter</h2>
            <div id="rate-limiter-panel" class="space-y-2 text-sm">
                <p class="text-gray-500">Waiting for data...</p>
            </div>
        </div>

        <!-- Workers Card -->
        <div class="card p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Workers</h2>
                <span id="worker-count" class="text-xs text-gray-400">0</span>
            </div>
            <div id="workers-list" class="space-y-3 text-sm max-h-96 overflow-y-auto">
                <p class="text-gray-500">No workers registered</p>
            </div>
        </div>

        <!-- Tasks Card -->
        <div class="card p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Tasks</h2>
                <span id="task-count" class="text-xs text-gray-400">0</span>
            </div>
            <div id="task-status-counts" class="flex flex-wrap gap-2 mb-3"></div>
            <div id="pending-info" class="text-xs text-yellow-400 mb-2 hidden"></div>
            <div id="tasks-list" class="space-y-2 text-sm max-h-72 overflow-y-auto">
                <p class="text-gray-500">No tasks</p>
            </div>
        </div>

        <!-- Scheduler Card -->
        <div class="card p-4 md:col-span-2">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">Scheduler</h2>
                <span id="scheduler-status" class="text-xs px-2 py-0.5 rounded badge-unavailable">--</span>
            </div>
            <div id="scheduler-night-window" class="mb-3 text-sm"></div>
            <div id="scheduler-jobs" class="space-y-2 text-sm max-h-48 overflow-y-auto">
                <p class="text-gray-500">Waiting for data...</p>
            </div>
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-4 mb-2">Recent Executions</h3>
            <div id="scheduler-history" class="space-y-1 text-xs max-h-36 overflow-y-auto">
                <p class="text-gray-500">No execution history</p>
            </div>
        </div>

    </main>

    <!-- Connection Status -->
    <div id="connection-status" class="connection-status bg-gray-800 text-gray-400">
        Connecting...
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
